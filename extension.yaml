id: jcode.lang.javascript
name: JavaScript Dev Pack
publisher: jcode
version: 0.2.2
type: language
requires:
  lsps: [typescript-language-server]
suggests:
  sdks: [nodejs]
  dbg: [js-debug]
description: Coding suggestions, a basic formatter, helpers, and a project template for JavaScript.
templates:
  - node-express-api
language:
  id: javascript
  extensions: [".js", ".jsx", ".mjs", ".cjs"]
  comment:
    line: "//"
    blockStart: "/*"
    blockEnd: "*/"
  strings: ["\"", "'", "`"]
  keywords: [const, let, var, function, return, if, else, for, while, do, switch, case,
    default, break, continue, new, class, extends, super, this, typeof, instanceof, in,
    of, try, catch, finally, throw, async, await, yield, import, export, from, as, null,
    undefined, true, false, delete, void, static, get, set]
  types: [Promise, Array, Object, String, Number, Boolean, Map, Set, Symbol, Date, JSON,
    Math, RegExp, Error]
  formatter:
    command: "npx --yes prettier --write {{file}} 2>/dev/null || true"
    indent: 2
    trimTrailingWhitespace: true
    insertFinalNewline: true
  completions:
    - label: cl
      detail: console.log
      insert: "console.log($0);"
    - label: fn
      detail: function
      insert: "function $1($2) {\n  $0\n}"
    - label: af
      detail: arrow function
      insert: "const $1 = ($2) => {\n  $0\n};"
    - label: imp
      detail: import
      insert: "import $1 from '$2';"
    - label: forof
      detail: for...of loop
      insert: "for (const $1 of $2) {\n  $0\n}"
    - label: tc
      detail: try/catch
      insert: "try {\n  $0\n} catch (err) {\n  console.error(err);\n}"
  helpers:
    - title: Export default
      snippet: "export default $1;"
    - title: JSON parse guard
      snippet: "const $1 = JSON.parse($2 ?? '{}');"

# --- header fields merged from extension.jehm ---
shortDescription: Coding suggestions, a basic formatter, helpers, and a project template for JavaScript.
minJCodeVersion: 1.0.0
targetJCodeVersion: 1.0.0
category: Languages
subcategory: JavaScript
images:
  icon: media/icon.png
  samples: []
  walkthrough: []
entry:
  manifest: extension.yaml
  ui: null
  libs: []
